<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulator CBT Urinary</title>
  <style>
    :root {
      --bg1: #fff7ed;
      --bg2: #eff6ff;
      --card: rgba(255, 255, 255, 0.92);
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #f97316;
      --primary-2: #ea580c;
      --secondary: #0ea5e9;
      --secondary-2: #0284c7;
      --back-1: #64748b;
      --back-2: #475569;
      --success-bg: #dcfce7;
      --success-border: #22c55e;
      --wrong-bg: #fee2e2;
      --wrong-border: #ef4444;
      --explain-bg: #fef3c7;
      --shadow: 0 20px 45px rgba(0, 0, 0, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #fde68a 0%, transparent 28%),
        radial-gradient(circle at top right, #bfdbfe 0%, transparent 30%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      max-width: 920px;
      margin: 24px auto;
      background: var(--card);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 28px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.65);
    }

    .home {
      text-align: center;
      padding: 90px 24px;
    }

    .badge {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 999px;
      background: linear-gradient(90deg, #f97316, #fb7185);
      color: white;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.3px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 38px;
      line-height: 1.2;
    }

    h2, h3 {
      margin-top: 0;
    }

    .subtitle {
      color: var(--muted);
      font-size: 18px;
      margin-bottom: 28px;
    }

    .go-btn,
    .next-btn,
    .restart-btn,
    .back-btn {
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 14px;
      padding: 14px 26px;
      font-size: 18px;
      font-weight: 700;
      transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
    }

    .go-btn {
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      box-shadow: 0 12px 28px rgba(249, 115, 22, 0.35);
    }

    .next-btn,
    .restart-btn {
      background: linear-gradient(135deg, var(--secondary), var(--secondary-2));
      box-shadow: 0 12px 28px rgba(14, 165, 233, 0.28);
    }

    .back-btn {
      background: linear-gradient(135deg, var(--back-1), var(--back-2));
      box-shadow: 0 12px 28px rgba(71, 85, 105, 0.28);
    }

    .go-btn:hover,
    .next-btn:hover,
    .restart-btn:hover,
    .back-btn:hover {
      transform: translateY(-2px);
    }

    .meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
      color: var(--muted);
      font-weight: 700;
    }

    .meta-chip {
      background: linear-gradient(135deg, #fff7ed, #ffedd5);
      border: 1px solid #fdba74;
      padding: 8px 14px;
      border-radius: 999px;
    }

    #question {
      font-size: 24px;
      line-height: 1.45;
      margin-bottom: 18px;
    }

    .options {
      display: grid;
      gap: 12px;
    }

    .options label {
      display: block;
      padding: 16px 18px;
      border: 2px solid #e5e7eb;
      border-radius: 16px;
      cursor: pointer;
      background: white;
      transition: all 0.18s ease;
      font-size: 16px;
      line-height: 1.5;
    }

    .options label:hover {
      border-color: #7dd3fc;
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(14, 165, 233, 0.1);
    }

    .options input {
      margin-right: 10px;
      transform: scale(1.1);
      accent-color: var(--secondary);
    }

    .correct {
      background: var(--success-bg) !important;
      border-color: var(--success-border) !important;
    }

    .wrong {
      background: var(--wrong-bg) !important;
      border-color: var(--wrong-border) !important;
    }

    .explain {
      margin-top: 18px;
      padding: 16px 18px;
      border-radius: 16px;
      background: var(--explain-bg);
      border-left: 6px solid #f59e0b;
      line-height: 1.6;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .result {
      text-align: center;
      padding: 80px 24px;
    }

    .result-box {
      background: linear-gradient(135deg, #eff6ff, #fdf2f8);
      border: 1px solid #c4b5fd;
      border-radius: 22px;
      padding: 28px;
      max-width: 520px;
      margin: 0 auto;
    }

    .score-number {
      font-size: 44px;
      font-weight: 800;
      margin: 14px 0;
      color: #7c3aed;
    }

    @media (max-width: 640px) {
      body {
        padding: 14px;
      }

      .container {
        padding: 20px;
        border-radius: 20px;
      }

      .home {
        padding: 60px 14px;
      }

      h1 {
        font-size: 28px;
      }

      #question {
        font-size: 20px;
      }

      .go-btn,
      .next-btn,
      .restart-btn,
      .back-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div id="home" class="container home">
    <div class="badge">Simulator CBT</div>
    <h1>Asterion 22</h1>
    <div class="subtitle">2022 · Urinary System</div>
    <button class="go-btn" type="button" id="startBtn">START CBT</button>
  </div>

  <div id="quizContainer" class="container" style="display:none;">
    <div class="meta">
      <div id="meta" class="meta-chip"></div>
      <div id="scoreInfo" class="meta-chip"></div>
      <div id="timerInfo" class="meta-chip"></div>
    </div>

    <h3 id="question"></h3>
    <div id="options" class="options"></div>
    <div id="explain" class="explain" style="display:none;"></div>

    <div class="actions">
      <button class="back-btn" type="button" id="backBtn">Back</button>
      <button class="next-btn" type="button" id="nextBtn">Next</button>
    </div>
  </div>

  <script>
    const questions =   [
  {
    q: "1. Seorang pria 45 tahun datang ke unit gawat darurat dengan riwayat 1 jam tiba-tiba nyeri pinggang sisi kiri menjalar ke bawah menuju pangkal pahanya. Pasien mengeluh kesakitan, yang tidak berkurang dengan posisi. Ia juga mengeluh mual dan muntah. Diagnosis Banding Seorang laki-laki berusia 45 tahun dengan riwayat nyeri pinggang kiri onset mendadak 1 jam dalam kasus ini",
    options: [
      "Pielonefritis akut",
      "Radikulitis herpes zoster",
      "Kehamilan ektopik",
      "Kolik bilier",
      "Batu ureter"
    ],
    answer: 4,
    explain: "Kolik ureter khas: nyeri flank mendadak menjalar ke inguinal/pangkal paha, sering disertai mual muntah."
  },
  {
    q: "2. Pernyataan tentang vesica urinaria yang benar:",

      "Urethra keluar dari dinding posteriornya",

      "Kedua ureter bermuara di bagian superiornya",
      "Seluruh bagiannya diliputi peritoneum",
      "Dindingnya terdiri dari otot bergaris"

  },
  {
    q: "3. Pasien usia 25 tahun datang dengan keluhan nyeri pada penis disertai ereksi yang terus menerus lebih dari 4 jam tanpa adanya rangsang sexual. Pasien dengan Riwayat SLE. Diagnosis yang mungkin pada kasus diatas adalah:",

  },
  {
    q: "4. Laki-laki usia 65 tahun, pensiunan polri datang ke poliklinik bedah/urologi dengan keluhan LUTS ringan yang baru dirasakan sejak 1 bulan terakhir. Tidak ada riwayat hematuria atapun keluar batu. Pada pemeriksaan colok dubur di dapatkan prostat membesar gr II (volume sekitar 40-60 cc), konsistensi kenyal, simetris dan teraba nodul kecil di lobus sisi kanan dan tidak nyeri tekan. Apa diagnosis dari pasien di atas ?",

    options: [
      "Posterior urethral valve",
      "Ektopik ureter kanan kiri",
      "Obstruksi ureteropelvic junction kanan kiri",
      "Batu pada uretra",
      "Double system ren kanan kiri"
    ],
    answer: 0,
    explain: "Posterior urethral valve menyebabkan obstruksi uretra posterior, refluks, dan hidronefrosis bilateral pada bayi laki-laki."
  },
  {
    q: "6. Pernyataan berikut merupakan perbedaan proximal dan distal tubule, yaitu:",
    options: [
      "Sitoplasma sel pada proximal tubule lebih pucat daripada distal tubule",
      "Mikrovili proximal tubule lebih pendek daripada distal tubule",
      "Lumen distal tubule lebih besar daripada proximal tubule",
      "Distal tubule lebih panjang daripada proximal tubule",
      "Macula densa merupakan bagian dari proximal tubule"

    answer: 2,
    explain: "Distal tubule tidak punya brush border sehingga lumen tampak lebih lebar dan lebih jelas dibanding proximal tubule."
  },
  {
    q: "7. Seorang wanita usia 25 tahun didiagnosis SLE sejak 5 tahun lalu. Beberapa hari ini, kedua kelopak mata dan ekstremitasnya bengkak akibat edema. Test urinalisis menunjukkan proteinuria, tanpa hematuria maupun bacteriuria. Selanjutnya dilakukan biopsi ginjal dengan gambaran penebalan membran basal glomerulus. Mekanisme yang mendasari terjadinya lesi glomerulus pada kasus ini?:",
    options: [
      "Cell mediated injury",
      "Podocytopathy",
      "Complement alternative pathway",
      "Maladaptive changes",
      "Antibody mediated injury"
    ],
    answer: 4,
    explain: "Penebalan GBM pada lupus nephritis konsisten dengan deposisi kompleks imun, yaitu antibody/immune-complex mediated injury."
  },
  {
    q: "8. Seorang laki-laki 40 tahun dirujuk dari Puskesmas dengan keluhan nyeri pinggang kiri sejak 1 bulan. Dia memiliki riwayat keluar batu 2 tahun yang lalu. Pada pemeriksaan urin terdapat leukosit, eritrosit dan bakteri. Batu saluran kemih yang dikonfirmasi dengan BOF dan USG, Lokasi Batu:",
    options: [
      "Batu calyx dapat menyebabkan ketidaknyamanan panggul, infeksi berulang dan tidak memerlukan pengobatan",

      "Batu ginjal panggul tidak cenderung menyebabkan gangguan drainase ginjal",
      "Batu ginjal panggul cenderung menyebabkan obstruksi UPJ/pelvis ginjal dan kaliks",
      "Batu ureter dengan diameter kurang dari 5 mm memerlukan intervensi bedah"

    answer: 3,
    explain: "Batu di pelvis ginjal dapat mengganggu aliran keluar dan menimbulkan obstruksi/hidronefrosis."
  },
  { q: "9. Laki-laki 70 tahun datang ke praktek saudara dengan keluhan kadang-kadang kencing tidak tuntas, kencing dimalam hari berkisar 1-2 kali. Keluhan lain tidak ada. Total IPSS 4. Pada pemeriksaan colok dubur didapatkan prostat membesar gr 1 tanpa tanda keganasan dan didapatkan hipertensi terkontrol. Usulan penatalaksanaannya adalah:",
    options: [
      "Observasi ketat atau watchful waiting",

    answer: 0,
    explain: "Gejala ringan dengan IPSS rendah umumnya cukup dengan observasi dan modifikasi gaya hidup."
  },
  {
    q: "10. Apakah yang membedakan struktur afferent dan efferent arteriole pada renal corpuscle? What is the difference between afferent and efferent arteriole structure in renal corpuscle?:",
    options: [

      "Diameter luar",
      "Jaringan ikat",
      "Jenis epitel"

    answer: 2,
    explain: "0"
  },
  {
    q: "11. Laki-laki usia 63 tahun, perokok dan mantan pekerja pabrik tekstil, datang ke poliklinik bedah/urologi dengan keluhan kencing merah dan berdarah yang diketahui sejak 3 bulan yang lalu. Namun kencing berdarah tidak terjadi setiap hari, melainkan sewaktu-waktu saja dan tidak ada rasa nyeri saat kencing. Kadang-kadang keluar gumpalan darah mati. Pada pemeriksaan fisik umum tampak sedikit pucat, dan pada colok dubur di dapatkan prostat membesar ringan, konsistensi kenyal, simetris dan teraba massa ekstralumen arah kranial dari prostat dengan konsisensi padat serta sedikit rasa nyeri. Apabila hasil histopatologi menunjukkan suatu tumor ganas, jenis atau tipe sel mana yang banyak dijumpai ?:",
    options: [
      "Sarkoma",
      "Karsinoma sel skuamosa",
      "Karsinoma urotelial",
      "Adenokarsinoma",
      "Limfoma malignan"
    ],
    answer: 2,
    explain: "Tumor kandung kemih tersering adalah karsinoma urotelial."
  },
  {
    q:"12. Seorang pria 40 tahun berat badan 80kg mengeluh tidak ada kencing sejak kemarin. Penderita mengalami diare hebat sejak 2 hari yang lalu. Pada pemeriksaan didapatkan penderita tampak sangat dehidrasi tekanan darah 95/70 mmHg, nadi 112/menit. Kreatinin plasma 3,5 mg/dl (sebelumnya 1 mg/dl), produksi urine sejak 14 jam lalu 80 ml. Dari pemeriksaan fisik lain didapatkan tanda-tanda edema paru. Kasus di atas dapat dikatagorikan?",
    options: [
      "Acute tubular necrosis",
      "AKI prerenal class I",
      "AKI prerenal class III",
      "AKI prerenal class II",
      "Established renal failure"
    ],
    answer: 2,
    explain: "Kenaikan kreatinin ≥3 kali baseline sesuai derajat berat, setara stage/class III."
  },
  {
    q: "13. Pada infeksi saluran kemih dijumpai:",
    options: [
      "Pada pasien dengan batu saluran kemih lebih sering terjadi ISK tanpa komplikasi",
      "Bakteriuri bermakna bila koloni kuman 10.000 CFU",
      "Jarang bila sudah terjadi penyakit ginjal kronik",
      "Penyebab terutama mikroorganisme dengan penyebaran ascending",
      "Kasus lebih tinggi pada pria"
    ],
    answer: 3,
    explain: "ISK paling sering berasal dari ascending infection dari uretra ke buli dan traktus atas."
  },
  {
    q: "14. Seorang wanita umur 55 tahun mengeluh demam dan nyeri flank kiri berulang sejak sebulan terakhir. Pada pemeriksaan fisik, didapatkan temperature 37,50C, nadi 84x/menit, RR 16x/menit, tensi 130/80 mmHg. Urinalisis menunjukkan leukosituria dan bacteriuria, tanpa proteinuria, glucosuria maupun ketonuria. Pasien ini diduga mengalami inflamasi kronik kibat infeksi bakteri pada jaringan ginjal. Gambaran histopatologik ginjal manakah berikut ini yang mendukung dugaan tersebut?:",
    options: [
      "Proliferasi endokapiler glomeruli",
      "Nekrosis epitel tubuli",
      "Hyaline cast pada lumen tubuli",
      "Infiltrat eosinofil pada jaringan interstisial",
      "Hialinosis arteriol"
    ],
    answer: 2,
    explain: "Pielonefritis kronik menunjukkan atrofi tubulus dan cast, sering berupa thyroidization."
  },
  {
    q: "15. Ginjal mempunyai fungsi ekskresi dan fungsi endokrin. Yang termasuk fungsi endokrin ginjal adalah:",
    options: [
      "Mengatur osmolaritas urin",
      "Reabsorpsi glukosa",
      "Mengatur kadar natrium urin",
      "Mengatur tekanan darah",
      "Filtrasi cairan"
    ],
    answer: 3,
    explain: "Ginjal berperan endokrin melalui sistem renin-angiotensin, juga EPO dan aktivasi vitamin D."
  },
  {
    q: "16. Alfa bloker bekerja dengan cara:",
    options: [
      "Menghambat perubahan testosteron menjadi dihidrotestosteron",
      "Mencegah stress dan urge inkontinensia",
      "Menurunkan proses inflamasi pada prostat",
      "Menghambat reseptor alfa di leher buli dan prostat",
      "Menurunkan kontraksi otot detrusor"
    ],
    answer: 3,
    explain: "Alpha-1 blocker merelaksasi otot polos leher buli dan prostat sehingga memperbaiki LUTS."
  },
  {
    q: "17. Mekanisme mikroorganisme menyebabkan batu saluran kemih dan enkrustasi pada indwelling kateter:",
    options: [

      "Membuat suasana urine menjadi asam",
      "Menginduksi eksfoliasi urothelial berlebihan",

    ],
    answer: 4,
    explain: "Bakteri urease positif memecah urea, membuat urin alkalis, dan memicu batu struvit serta enkrustasi."
  },
  {
    q: "18. Kristal yang ditemukan pada urine asam:",

      "Kalsium karbonat"

  },
  {
    q: "19. Pasien usia 25 tahun datang dengan keluhan nyeri pada penis disertai ereksi yang terus menerus lebih dari 4 jam tanpa adanya rangsang sexual. Pasien dengan Riwayat SLE. Pemeriksaan Fisik yang didapat pada kasus tersebut diatas adalah:",

  {
    q: "20. Seorang perempuan berusia 50 tahun suku Bali, datang ke poliklinik dengan sering mengalami mual-mual sejak 2 minggu yang lalu. Penderita mengaku mengalami penyakit kencing manis sejak 6 tahun yang lalu dan berobat tidak teratur dan tekanan darah tinggi diketahui sejak 3 tahun yang lalu. Pada pemeriksaan fisik ditemukan TD 150/100 mmHg, suhu 36,50 C, respirasi 16X/menit. Dari pemeriksaan laboratorium kadar kreatinin serum 1,8 mg/dl; Darah lengkap, HB 10,5 dan urin lengkap terdapat protein +3, maka pemeriksaan utama dan segera dilakukan adalah:",

    options: [

      "Transport aktif",

      "Facilitated diffusion carrier",

  },
  {
    q: "22. Seorang pria 45 tahun datang ke unit gawat darurat dengan riwayat 1 jam tiba-tiba nyeri pinggang sisi kiri menjalar ke bawah menuju pangkal pahanya. Pasien mengeluh kesakitan, yang tidak berkurang dengan posisi. Ia juga mengeluh mual dan muntah. Penatalaksanaan Paling Akut pada pria 45 tahun dengan nyeri pinggang pada kasus ini:",
    options: [
      "Analgesik, antiemetik, antibiotik dan cairan intravena",

  {

    let current = 0;
    let currentOptions = [];
    let score = 0;
    let answered = false;
    let timeLeft = 57 * 60;
    let timerInterval = null;

    const homeEl = document.getElementById("home");
    const quizEl = document.getElementById("quizContainer");
    const metaEl = document.getElementById("meta");
    const scoreInfoEl = document.getElementById("scoreInfo");
    const timerInfoEl = document.getElementById("timerInfo");
    const questionEl = document.getElementById("question");
    const optionsEl = document.getElementById("options");
    const explainEl = document.getElementById("explain");
    const startBtn = document.getElementById("startBtn");
    const nextBtn = document.getElementById("nextBtn");
    const backBtn = document.getElementById("backBtn");

    const userAnswers = Array(questions.length).fill(null);

    startBtn.addEventListener("click", startQuiz);
    nextBtn.addEventListener("click", nextQuestion);
    backBtn.addEventListener("click", prevQuestion);

    function startQuiz() {
      homeEl.style.display = "none";
      quizEl.style.display = "block";
      current = 0;
      score = 0;
      answered = false;
      timeLeft = 100 * 60;
      userAnswers.fill(null);
      startTimer();
      loadQuestion();
    }

    function startTimer() {
      clearInterval(timerInterval);
      updateTimerDisplay();

      timerInterval = setInterval(() => {
        timeLeft--;
        updateTimerDisplay();

        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          finishQuiz();
        }
      }, 1000);
    }

    function updateTimerDisplay() {
      const minutes = String(Math.floor(timeLeft / 60)).padStart(2, "0");
      const seconds = String(timeLeft % 60).padStart(2, "0");
      timerInfoEl.innerText = "Timer: " + minutes + ":" + seconds;
    }

    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    function recalculateScore() {
      score = userAnswers.reduce((total, answer, index) => {
        return total + (answer === questions[index].answer ? 1 : 0);
      }, 0);

      scoreInfoEl.innerText = "Score: " + score;
    }

    function cleanOptionText(text) {
      return text.replace(/^[a-e]\.\s*/i, "");
    }

    function loadQuestion() {
      answered = userAnswers[current] !== null;
      explainEl.style.display = "none";
      explainEl.innerText = "";

      const q = questions[current];
      metaEl.innerText = "Soal " + (current + 1) + " / " + questions.length;
      questionEl.innerText = q.q;

      currentOptions = q.options.map((opt, i) => ({
        text: opt,
        isCorrect: i === q.answer,
        originalIndex: i
      }));

      shuffleArray(currentOptions);

      optionsEl.innerHTML = currentOptions.map((opt, i) => `
        <label>
          <input type="radio" name="opt" data-index="${i}">
          ${String.fromCharCode(65 + i)}. ${cleanOptionText(opt.text)}
        </label>
      `).join("");

      const radios = optionsEl.querySelectorAll('input[name="opt"]');
      const labels = optionsEl.querySelectorAll("label");
      const savedAnswer = userAnswers[current];

      radios.forEach((radio) => {
        radio.addEventListener("change", function () {
          check(parseInt(this.dataset.index, 10));
        });
      });

      if (savedAnswer !== null) {
        const selectedIndex = currentOptions.findIndex(
          (opt) => opt.originalIndex === savedAnswer
        );

        if (selectedIndex !== -1) {
          radios[selectedIndex].checked = true;

          labels.forEach((label, index) => {
            const input = label.querySelector("input");
            input.disabled = true;

            if (currentOptions[index].isCorrect) {
              label.classList.add("correct");
            }

            if (index === selectedIndex && !currentOptions[index].isCorrect) {
              label.classList.add("wrong");
            }
          });

          explainEl.style.display = "block";
          explainEl.innerText = "Penjelasan: " + questions[current].explain;
        }
      }

      backBtn.disabled = current === 0;
      backBtn.style.opacity = current === 0 ? "0.6" : "1";

      recalculateScore();
    }

    function check(i) {
      const labels = optionsEl.querySelectorAll("label");
      const chosenOriginalIndex = currentOptions[i].originalIndex;

      const previousAnswer = userAnswers[current];
      userAnswers[current] = chosenOriginalIndex;
      answered = true;

      labels.forEach((label) => {
        label.classList.remove("correct", "wrong");
      });

      labels.forEach((label, index) => {
        const input = label.querySelector("input");
        input.disabled = true;

        if (currentOptions[index].isCorrect) {
          label.classList.add("correct");
        }

        if (index === i && !currentOptions[index].isCorrect) {
          label.classList.add("wrong");
        }
      });

      if (previousAnswer === null || previousAnswer !== chosenOriginalIndex) {
        recalculateScore();
      }

      explainEl.style.display = "block";
      explainEl.innerText = "Penjelasan: " + questions[current].explain;
    }

    function prevQuestion() {
      if (current > 0) {
        current--;
        loadQuestion();
      }
    }

    function nextQuestion() {
      if (!answered) return;

      current++;

      if (current < questions.length) {
        loadQuestion();
      } else {
        finishQuiz();
      }
    }

    function finishQuiz() {
      clearInterval(timerInterval);
      recalculateScore();

      document.body.innerHTML = `
        <div class="container result">
          <div class="result-box">
            <div class="badge">Quiz Selesai</div>
            <h2>Hasil Akhir</h2>
            <div class="score-number">${score}/${questions.length}</div>
            <p>Semoga CBT juga lancar ya! Exc33ding A!</p>
            <button class="restart-btn" type="button" onclick="location.reload()">Restart</button>
          </div>
        </div>
      `;
    }
  </script>
</body>
